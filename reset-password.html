<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password — LeadFlow AI</title>
<link rel="stylesheet" href="styles.css">
<style>
  body{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .panel{width:100%;max-width:400px;padding:34px}
  h2{font-family:var(--serif);font-size:22px;font-weight:600;margin-bottom:16px}
</style>
</head>
<body>
  <div class="card panel">
    <h2>Set a new password</h2>
    <div id="msg"></div>
    <div class="field">
      <label>New password</label>
      <div class="pw-row">
        <input id="newPass" type="password" placeholder="Min. 6 characters">
        <button type="button" class="pw-toggle" onclick="LF.togglePassword('newPass', this)">Show</button>
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="updatePassword()">Update password →</button>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="auth.js"></script>
<script>
async function updatePassword() {
  const password = document.getElementById('newPass').value;
  const msg = document.getElementById('msg');
  if (password.length < 6) { msg.innerHTML = '<div class="msg-box msg-error">Password must be at least 6 characters.</div>'; return; }
  const { error } = await LF.client.auth.updateUser({ password });
  if (error) { msg.innerHTML = `<div class="msg-box msg-error">${error.message}</div>`; return; }
  msg.innerHTML = '<div class="msg-box msg-info">Password updated. You can now sign in.</div>';
  setTimeout(() => (window.location.href = '/onboarding.html'), 1500);
}
</script>
</body>
</html>
